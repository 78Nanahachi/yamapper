<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やまっぺ - ホーム</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="nav-logo">⛰️ やまっぺ<span class="nav-version">v1.1</span></a>
    <div class="nav-links">
      <a href="home.html" class="active">ホーム</a>
      <a href="albums.html">アルバム</a>
      <a href="comments.html">コメント</a>
      <a href="#" onclick="logout()">ログアウト</a>
    </div>
  </nav>

  <header class="hero">
    <div class="hero-bg">
      <div class="hero-peak hp1"></div>
      <div class="hero-peak hp2"></div>
      <div class="hero-peak hp3"></div>
    </div>
    <div class="hero-content">
      <h1>やまっぺ</h1>
      <p>山と歩む、記憶の記録</p>
    </div>
  </header>

  <main class="main-content">
    <section class="section">
      <h2 class="section-title">最近の山行</h2>
      <div class="cards-grid" id="recentAlbums">
        <p class="empty-msg">読み込み中…</p>
      </div>
      <div class="center-btn">
        <a href="albums.html" class="btn-outline">すべてのアルバムを見る →</a>
      </div>
    </section>

    <section class="section stats-section">
      <h2 class="section-title">記録</h2>
      <div class="stats-grid">
        <div class="stat-card">
          <span class="stat-num" id="totalMountains">-</span>
          <span class="stat-label">登頂数</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="totalPhotos">-</span>
          <span class="stat-label">写真枚数</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="totalVideos">-</span>
          <span class="stat-label">動画数</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="totalComments">-</span>
          <span class="stat-label">コメント</span>
        </div>
        <div class="stat-card">
          <span class="stat-num" id="totalPhotoComments">-</span>
          <span class="stat-label">写真・動画コメント</span>
        </div>
      </div>
    </section>

    <section class="section">
      <h2 class="section-title">最新コメント</h2>
      <div class="comments-preview" id="recentComments">
        <p class="empty-msg">読み込み中…</p>
      </div>
      <div class="center-btn">
        <a href="comments.html" class="btn-outline">コメントページへ →</a>
      </div>
    </section>
  </main>

  <footer class="footer">
    <p>⛰️ やまっぺ &copy; 2026</p>
  </footer>

  <script src="js/auth.js"></script>
  <script type="module">
    import { onAlbumsChanged, onCommentsChanged, countAllPhotoComments } from './js/data.js';
    checkAuth();

    onAlbumsChanged(albums => {
      const container = document.getElementById('recentAlbums');
      if (albums.length === 0) {
        container.innerHTML = '<p class="empty-msg">まだアルバムがありません。<a href="albums.html">追加する</a></p>';
      } else {
        container.innerHTML = albums.slice(0, 3).map(a => `
          <a href="album-detail.html?id=${a.id}" class="card">
            <div class="card-img" style="background-color:${a.color}; ${a.coverUrl ? 'background-image:url(' + a.coverUrl + ');background-size:cover;background-position:center;' : ''}">
              ${!a.coverUrl ? '<span class="card-emoji">' + a.emoji + '</span>' : ''}
            </div>
            <div class="card-body">
              <h3>${a.title}</h3>
              <p class="card-date">${a.date}</p>
              <p class="card-desc">${a.description}</p>
              <span class="card-tag">${a.location}</span>
            </div>
          </a>
        `).join('');
      }
      const totalPhotos = albums.reduce((sum, a) => sum + (a.photos ? a.photos.filter(p => p.type !== 'video').length : 0), 0);
      const totalVideos = albums.reduce((sum, a) => sum + (a.photos ? a.photos.filter(p => p.type === 'video').length : 0), 0);
      document.getElementById('totalMountains').textContent = albums.length;
      document.getElementById('totalPhotos').textContent = totalPhotos;
      document.getElementById('totalVideos').textContent = totalVideos;

      // 写真・動画コメント数を集計
      countAllPhotoComments(albums).then(count => {
        document.getElementById('totalPhotoComments').textContent = count;
      });
    });

    onCommentsChanged(comments => {
      document.getElementById('totalComments').textContent = comments.length;
      const container = document.getElementById('recentComments');
      if (comments.length === 0) {
        container.innerHTML = '<p class="empty-msg">まだコメントがありません。</p>';
        return;
      }
      container.innerHTML = comments.slice(-3).reverse().map(c => `
        <div class="comment-preview-item">
          <span class="comment-author">${c.name}</span>
          <span class="comment-text">${c.text.slice(0, 60)}${c.text.length > 60 ? '…' : ''}</span>
          <span class="comment-date">${c.date}</span>
        </div>
      `).join('');
    });

    function logout() {
      sessionStorage.removeItem('yamapper_auth');
      window.location.href = 'index.html';
    }
    window.logout = logout;
  </script>
</body>
</html>
