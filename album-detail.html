<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やまっぺ - アルバム詳細</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="nav-logo">⛰️ やまっぺ</a>
    <div class="nav-links">
      <a href="home.html">ホーム</a>
      <a href="albums.html" class="active">アルバム</a>
      <a href="comments.html">コメント</a>
      <a href="#" onclick="logout()">ログアウト</a>
    </div>
  </nav>

  <div class="album-header" id="albumHeader">
    <a href="albums.html" class="back-link">← アルバム一覧</a>
    <div class="album-title-area">
      <span id="albumEmoji" class="album-emoji-big"></span>
      <div>
        <h1 id="albumTitle">読み込み中…</h1>
        <p id="albumMeta"></p>
      </div>
    </div>
    <p id="albumDesc" class="album-desc-text"></p>
  </div>

  <main class="main-content">

    <!-- ドラッグ＆ドロップエリア -->
    <div class="drop-zone" id="dropZone"
      onclick="document.getElementById('photoInput').click()"
      ondragover="handleDragOver(event)"
      ondragleave="handleDragLeave(event)"
      ondrop="handleDrop(event)">
      <div class="drop-zone-inner">
        <span class="drop-icon">📷</span>
        <p class="drop-main">写真をここにドラッグ＆ドロップ</p>
        <p class="drop-sub">または クリックしてファイルを選択</p>
      </div>
      <input type="file" id="photoInput" accept="image/*" multiple style="display:none" onchange="uploadPhotos(event)">
    </div>

    <!-- アップロード進捗バー -->
    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
      <span id="progressText">0 / 0 枚アップロード中…</span>
    </div>

    <div class="photo-grid" id="photoGrid">
      <p class="empty-msg">まだ写真がありません。上のエリアから追加できます。</p>
    </div>
  </main>

  <!-- ライトボックス -->
  <div class="lightbox" id="lightbox" style="display:none" onclick="closeLightbox()">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-prev" onclick="event.stopPropagation();changePhoto(-1)">‹</button>
    <img id="lbImg" src="" alt="">
    <button class="lb-next" onclick="event.stopPropagation();changePhoto(1)">›</button>
    <p id="lbCaption" class="lb-caption"></p>
  </div>

  <footer class="footer">
    <p>⛰️ やまっぺ &copy; 2026</p>
  </footer>

  <script src="js/data.js"></script>
  <script src="js/auth.js"></script>
  <script>
    // =============================
    // Cloudinary 設定
    // =============================
    const CLOUD_NAME   = 'dgsbvnswt';
    const UPLOAD_PRESET = 'yamapper';
    const UPLOAD_URL   = `https://api.cloudinary.com/v1_1/${CLOUD_NAME}/image/upload`;

    // =============================
    // 初期化
    // =============================
    checkAuth();

    const params  = new URLSearchParams(window.location.search);
    const albumId = params.get('id');
    let currentPhotos = [];
    let lbIndex = 0;

    function loadAlbum() {
      const albums = getAlbums();
      const album  = albums.find(a => a.id === albumId);
      if (!album) { window.location.href = 'albums.html'; return; }

      document.title = `やまっぺ - ${album.title}`;
      document.getElementById('albumEmoji').textContent  = album.emoji;
      document.getElementById('albumTitle').textContent  = album.title;
      document.getElementById('albumMeta').textContent   = `${album.date}　📍 ${album.location}`;
      document.getElementById('albumDesc').textContent   = album.description;
      document.getElementById('albumHeader').style.background = album.color;

      currentPhotos = album.photos || [];
      renderPhotos();
    }

    // =============================
    // 写真表示
    // =============================
    function renderPhotos() {
      const grid = document.getElementById('photoGrid');
      if (currentPhotos.length === 0) {
        grid.innerHTML = '<p class="empty-msg">まだ写真がありません。「📷 写真を追加」から追加できます。</p>';
        return;
      }
      grid.innerHTML = currentPhotos.map((p, i) => `
        <div class="photo-item" onclick="openLightbox(${i})">
          <img src="${p.src}" alt="${p.caption || ''}" loading="lazy">
          <div class="photo-overlay">
            <span>${p.caption || ''}</span>
            <button class="btn-del-photo" onclick="event.stopPropagation();deletePhoto(${i})">✕</button>
          </div>
        </div>
      `).join('');
    }

    // =============================
    // ドラッグ＆ドロップ
    // =============================
    function handleDragOver(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.add('drag-over');
    }

    function handleDragLeave(e) {
      document.getElementById('dropZone').classList.remove('drag-over');
    }

    function handleDrop(e) {
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/'));
      if (files.length > 0) uploadFiles(files);
    }

    // =============================
    // Cloudinaryへアップロード
    // =============================
    async function uploadPhotos(event) {
      const files = Array.from(event.target.files);
      if (files.length === 0) return;
      await uploadFiles(files);
      event.target.value = '';
    }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadFiles(files) {
      const progressWrap = document.getElementById('progressWrap');
      const progressBar  = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');

      progressWrap.style.display = 'block';
      let done = 0;

      for (const file of files) {
        progressText.textContent = `${done} / ${files.length} 枚アップロード中…`;
        progressBar.style.width  = `${Math.round(done / files.length * 100)}%`;

        try {
          const base64 = await toBase64(file);
          const res = await fetch(UPLOAD_URL, {
            method:  'POST',
            headers: { 'Content-Type': 'application/json' },
            body:    JSON.stringify({
              file:          base64,
              upload_preset: UPLOAD_PRESET
            })
          });
          const data = await res.json();

          if (data.secure_url) {
            currentPhotos.push({
              src:      data.secure_url,
              publicId: data.public_id,
              caption:  file.name.replace(/\.[^/.]+$/, '')
            });
          } else {
            console.error('Upload error:', data);
          }
        } catch (err) {
          console.error('Upload failed:', err);
        }
        done++;
      }

      progressBar.style.width  = '100%';
      progressText.textContent = `${done} 枚のアップロード完了！`;
      setTimeout(() => { progressWrap.style.display = 'none'; }, 2000);

      savePhotos();
      renderPhotos();
    }

    // =============================
    // 写真削除（localStorageのURLのみ削除）
    // =============================
    function deletePhoto(index) {
      if (!confirm('この写真をアルバムから削除しますか？\n（Cloudinary上の画像は残ります）')) return;
      currentPhotos.splice(index, 1);
      savePhotos();
      renderPhotos();
    }

    function savePhotos() {
      const albums = getAlbums();
      const idx    = albums.findIndex(a => a.id === albumId);
      if (idx !== -1) {
        albums[idx].photos = currentPhotos;
        saveAlbums(albums);
      }
    }

    // =============================
    // ライトボックス
    // =============================
    function openLightbox(i) {
      lbIndex = i;
      document.getElementById('lbImg').src             = currentPhotos[i].src;
      document.getElementById('lbCaption').textContent = currentPhotos[i].caption || '';
      document.getElementById('lightbox').style.display = 'flex';
    }

    function closeLightbox() {
      document.getElementById('lightbox').style.display = 'none';
    }

    function changePhoto(dir) {
      lbIndex = (lbIndex + dir + currentPhotos.length) % currentPhotos.length;
      document.getElementById('lbImg').src             = currentPhotos[lbIndex].src;
      document.getElementById('lbCaption').textContent = currentPhotos[lbIndex].caption || '';
    }

    function logout() {
      sessionStorage.removeItem('yamapper_auth');
      window.location.href = 'index.html';
    }

    loadAlbum();
  </script>
</body>
</html>
