<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><text y='.9em' font-size='90'>⛰️</text></svg>">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>やまっぺ - アルバム詳細</title>
  <link rel="stylesheet" href="css/style.css">
  <link href="https://fonts.googleapis.com/css2?family=Zen+Kurenaido&family=Noto+Serif+JP:wght@300;400;600&family=Shippori+Mincho:wght@400;600&display=swap" rel="stylesheet">
</head>
<body>
  <nav class="navbar">
    <a href="home.html" class="nav-logo">⛰️ やまっぺ<span class="nav-version">v1.1</span></a>
    <div class="nav-links">
      <a href="home.html">ホーム</a>
      <a href="albums.html" class="active">アルバム</a>
      <a href="comments.html">コメント</a>
      <a href="#" onclick="logout()">ログアウト</a>
    </div>
  </nav>

  <div class="album-header" id="albumHeader">
    <a href="albums.html" class="back-link">← アルバム一覧</a>
    <div class="album-title-area">
      <span id="albumEmoji" class="album-emoji-big"></span>
      <div>
        <h1 id="albumTitle">読み込み中…</h1>
        <p id="albumMeta"></p>
      </div>
    </div>
    <p id="albumDesc" class="album-desc-text"></p>
  </div>

  <main class="main-content">
    <!-- アップロードエリア（写真・動画共通） -->
    <div class="drop-zone" id="dropZone"
      onclick="document.getElementById('mediaInput').click()"
      ondragover="handleDragOver(event)"
      ondragleave="handleDragLeave(event)"
      ondrop="handleDrop(event)">
      <div class="drop-zone-inner">
        <span class="drop-icon">📷🎬</span>
        <p class="drop-main">写真・動画をここにドラッグ＆ドロップ</p>
        <p class="drop-sub">または クリックしてファイルを選択（動画は120MBまで）</p>
      </div>
      <input type="file" id="mediaInput" accept="image/*,video/*" multiple style="display:none" onchange="uploadMedia(event)">
    </div>

    <!-- 動画説明 -->
    <div class="video-option-bar">
      <p class="compress-hint">📹 動画は自動的にMP4形式に変換・圧縮されます（120MBまで）</p>
    </div>

    <div class="progress-wrap" id="progressWrap" style="display:none">
      <div class="progress-bar" id="progressBar"></div>
      <span id="progressText">準備中…</span>
    </div>

    <div class="photo-grid" id="photoGrid">
      <p class="empty-msg">まだ写真・動画がありません。上のエリアから追加できます。</p>
    </div>
  </main>

  <!-- ライトボックス（写真・動画＋コメント） -->
  <div class="lightbox" id="lightbox" style="display:none">
    <button class="lb-close" onclick="closeLightbox()">✕</button>
    <button class="lb-prev" onclick="changePhoto(-1)">‹</button>
    <div class="lb-main">
      <!-- 写真表示 -->
      <img id="lbImg" src="" alt="" style="display:none">
      <!-- 動画表示 -->
      <video id="lbVideo" controls style="display:none; max-width:60vw; max-height:75vh; border-radius:6px;"></video>
      <div class="lb-comment-panel">
        <h3 class="lb-comment-title">💬 コメント</h3>
        <div class="lb-comments" id="lbComments"></div>
        <div class="lb-comment-form">
          <input type="text" id="lbName" placeholder="お名前">
          <textarea id="lbText" placeholder="コメントを入力…" rows="2"></textarea>
          <button class="btn-primary" onclick="postPhotoComment()">投稿</button>
        </div>
      </div>
    </div>
    <button class="lb-next" onclick="changePhoto(1)">›</button>
    <p id="lbCaption" class="lb-caption"></p>
  </div>

  <footer class="footer">
    <p>⛰️ やまっぺ &copy; 2026</p>
  </footer>

  <script src="js/auth.js"></script>
  <script type="module">
    import { getAlbum, savePhotos, onPhotoCommentsChanged, addPhotoComment, removePhotoComment } from './js/data.js';

    checkAuth();

    const CLOUD_NAME    = 'dgsbvnswt';
    const UPLOAD_PRESET = 'yamapper';
    const MAX_VIDEO_MB  = 120;

    const params  = new URLSearchParams(window.location.search);
    const albumId = params.get('id');
    let currentPhotos = [];
    let lbIndex = 0;
    let unsubPhotoComments = null;

    // アルバム読み込み
    async function loadAlbum() {
      const album = await getAlbum(albumId);
      if (!album) { window.location.href = 'albums.html'; return; }
      document.title = 'やまっぺ - ' + album.title;
      document.getElementById('albumEmoji').textContent  = album.emoji;
      document.getElementById('albumTitle').textContent  = album.title;
      document.getElementById('albumMeta').textContent   = album.date + '　📍 ' + album.location;
      document.getElementById('albumDesc').textContent   = album.description;
      document.getElementById('albumHeader').style.background = album.color;
      currentPhotos = album.photos || [];
      renderPhotos();
    }

    // グリッド表示（写真・動画対応・並び替えD&D付き）
    function renderPhotos() {
      const grid = document.getElementById('photoGrid');
      if (currentPhotos.length === 0) {
        grid.innerHTML = '<p class="empty-msg">まだ写真・動画がありません。上のエリアから追加できます。</p>';
        return;
      }
      grid.innerHTML = currentPhotos.map((p, i) => {
        if (p.type === 'video') {
          return `
            <div class="photo-item video-item" draggable="true"
              data-index="${i}"
              ondragstart="sortDragStart(event)"
              ondragover="sortDragOver(event)"
              ondragleave="sortDragLeave(event)"
              ondrop="sortDrop(event)"
              ondragend="sortDragEnd(event)"
              onclick="openLightbox(${i})">
              <video src="${p.src}" class="video-thumb" muted playsinline preload="metadata"></video>
              <div class="video-play-icon">▶</div>
              <div class="photo-overlay">
                <span class="photo-comment-badge" id="badge-${i}">💬 -</span>
                <button class="btn-del-photo" onclick="event.stopPropagation();deletePhoto(${i})">✕</button>
              </div>
              <div class="sort-handle">⠿</div>
            </div>`;
        } else {
          return `
            <div class="photo-item" draggable="true"
              data-index="${i}"
              ondragstart="sortDragStart(event)"
              ondragover="sortDragOver(event)"
              ondragleave="sortDragLeave(event)"
              ondrop="sortDrop(event)"
              ondragend="sortDragEnd(event)"
              onclick="openLightbox(${i})">
              <img src="${p.src}" alt="${p.caption || ''}" loading="lazy">
              <div class="photo-overlay">
                <span class="photo-comment-badge" id="badge-${i}">💬 -</span>
                <button class="btn-del-photo" onclick="event.stopPropagation();deletePhoto(${i})">✕</button>
              </div>
              <div class="sort-handle">⠿</div>
            </div>`;
        }
      }).join('');
      currentPhotos.forEach((_, i) => loadCommentCount(i));
    }

    // 並び替えD&D
    let dragSrcIndex = null;

    window.sortDragStart = (e) => {
      dragSrcIndex = parseInt(e.currentTarget.dataset.index);
      e.currentTarget.classList.add('dragging');
      e.dataTransfer.effectAllowed = 'move';
    };

    window.sortDragOver = (e) => {
      e.preventDefault();
      e.dataTransfer.dropEffect = 'move';
      e.currentTarget.classList.add('drag-target');
    };

    window.sortDragLeave = (e) => {
      e.currentTarget.classList.remove('drag-target');
    };

    window.sortDrop = async (e) => {
      e.preventDefault();
      e.stopPropagation();
      e.currentTarget.classList.remove('drag-target');
      const dropIndex = parseInt(e.currentTarget.dataset.index);
      if (dragSrcIndex === null || dragSrcIndex === dropIndex) return;
      // 並び替え実行
      const moved = currentPhotos.splice(dragSrcIndex, 1)[0];
      currentPhotos.splice(dropIndex, 0, moved);
      await savePhotos(albumId, currentPhotos);
      renderPhotos();
    };

    window.sortDragEnd = (e) => {
      e.currentTarget.classList.remove('dragging');
      document.querySelectorAll('.drag-target').forEach(el => el.classList.remove('drag-target'));
      dragSrcIndex = null;
    };

    // コメント数バッジ
    function loadCommentCount(photoIndex) {
      import('./js/data.js').then(({ onPhotoCommentsChanged }) => {
        onPhotoCommentsChanged(albumId, photoIndex, comments => {
          const badge = document.getElementById('badge-' + photoIndex);
          if (badge) badge.textContent = '💬 ' + comments.length;
        });
      });
    }

    // ライトボックスを開く
    function openLightbox(i) {
      lbIndex = i;
      const item = currentPhotos[i];
      const img   = document.getElementById('lbImg');
      const video = document.getElementById('lbVideo');

      if (item.type === 'video') {
        img.style.display   = 'none';
        video.style.display = 'block';
        video.src = item.src;
        video.load();
      } else {
        video.pause();
        video.style.display = 'none';
        img.style.display   = 'block';
        img.src = item.src;
      }
      document.getElementById('lbCaption').textContent = item.caption || '';
      document.getElementById('lightbox').style.display = 'flex';
      loadPhotoComments(i);
    }
    window.openLightbox = openLightbox;

    // 写真コメントを読み込む
    function loadPhotoComments(photoIndex) {
      if (unsubPhotoComments) unsubPhotoComments();
      unsubPhotoComments = onPhotoCommentsChanged(albumId, photoIndex, comments => {
        const container = document.getElementById('lbComments');
        if (comments.length === 0) {
          container.innerHTML = '<p class="lb-no-comment">まだコメントがありません</p>';
          return;
        }
        container.innerHTML = comments.map(c => `
          <div class="lb-comment-item">
            <span class="lb-comment-avatar">${c.name.charAt(0)}</span>
            <div class="lb-comment-body">
              <strong>${c.name}</strong>
              <span class="lb-comment-date">${c.date}</span>
              <p>${c.text}</p>
            </div>
            <button class="btn-del-comment" onclick="window.delPhotoComment('${c.id}')">✕</button>
          </div>
        `).join('');
      });
    }

    // コメント投稿
    window.postPhotoComment = async () => {
      const name = document.getElementById('lbName').value.trim();
      const text = document.getElementById('lbText').value.trim();
      if (!name) { alert('お名前を入力してください'); return; }
      if (!text) { alert('コメントを入力してください'); return; }
      await addPhotoComment(albumId, lbIndex, name, text);
      document.getElementById('lbName').value = '';
      document.getElementById('lbText').value = '';
    };

    window.delPhotoComment = async (commentId) => {
      if (!confirm('このコメントを削除しますか？')) return;
      await removePhotoComment(albumId, commentId);
    };

    function closeLightbox() {
      const video = document.getElementById('lbVideo');
      video.pause();
      document.getElementById('lightbox').style.display = 'none';
      if (unsubPhotoComments) { unsubPhotoComments(); unsubPhotoComments = null; }
    }

    function changePhoto(dir) {
      lbIndex = (lbIndex + dir + currentPhotos.length) % currentPhotos.length;
      openLightbox(lbIndex);
    }

    // D&D
    window.handleDragOver  = e => { e.preventDefault(); document.getElementById('dropZone').classList.add('drag-over'); };
    window.handleDragLeave = e => { document.getElementById('dropZone').classList.remove('drag-over'); };
    window.handleDrop      = e => {
      e.preventDefault();
      document.getElementById('dropZone').classList.remove('drag-over');
      const files = Array.from(e.dataTransfer.files).filter(f => f.type.startsWith('image/') || f.type.startsWith('video/'));
      if (files.length > 0) uploadFiles(files);
    };

    window.uploadMedia = e => {
      const files = Array.from(e.target.files);
      if (files.length > 0) {
        const progressWrap = document.getElementById('progressWrap');
        const progressText = document.getElementById('progressText');
        progressWrap.style.display = 'block';
        progressText.textContent = '準備中… しばらくお待ちください';
        document.getElementById('progressBar').style.width = '5%';
        uploadFiles(files);
      }
      e.target.value = '';
    };

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function uploadFiles(files) {
      const progressWrap = document.getElementById('progressWrap');
      const progressBar  = document.getElementById('progressBar');
      const progressText = document.getElementById('progressText');
      progressWrap.style.display = 'block';
      let done = 0;
      let skipped = 0;

      for (const file of files) {
        const isVideo = file.type.startsWith('video/');

        // 動画サイズチェック（50MB）
        if (isVideo && file.size > MAX_VIDEO_MB * 1024 * 1024) {
          alert(file.name + ' は50MBを超えています。スキップします。');
          skipped++;
          done++;
          continue;
        }

        progressText.textContent = (done + 1) + ' / ' + files.length + ' ' + (isVideo ? '動画' : '写真') + 'をアップロード中…';
        progressBar.style.width  = Math.round(done / files.length * 100) + '%';

        try {
          const endpoint = 'https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/' + (isVideo ? 'video' : 'image') + '/upload';
          let res;

          if (isVideo) {
            // 動画はFormData方式（大容量対応）
            // 圧縮はCloudinaryのプリセット側で設定
            const fd = new FormData();
            fd.append('file', file);
            fd.append('upload_preset', UPLOAD_PRESET);
            res = await fetch(endpoint, { method: 'POST', body: fd });
          } else {
            // 写真はBase64+JSON方式
            const base64 = await toBase64(file);
            res = await fetch(endpoint, {
              method:  'POST',
              headers: { 'Content-Type': 'application/json' },
              body:    JSON.stringify({ file: base64, upload_preset: UPLOAD_PRESET })
            });
          }

          const data = await res.json();

          if (data.secure_url) {
            const useCompress2 = false;
            const url = useCompress2 && data.eager && data.eager[0]
              ? data.eager[0].secure_url
              : data.secure_url;
            currentPhotos.push({
              src:      url,
              publicId: data.public_id,
              caption:  file.name.replace(/\.[^/.]+$/, ''),
              type:     isVideo ? 'video' : 'image'
            });
          } else {
            console.error('Upload error:', data);
            alert('エラー詳細: ' + JSON.stringify(data.error));
          }
        } catch(err) {
          console.error('Upload failed:', err);
        }
        done++;
      }

      progressBar.style.width  = '100%';
      const uploaded = done - skipped;
      progressText.textContent = uploaded + ' 件のアップロード完了！';
      setTimeout(() => { progressWrap.style.display = 'none'; }, 2000);
      await savePhotos(albumId, currentPhotos);
      renderPhotos();
    }

    window.deletePhoto = async (index) => {
      if (!confirm('この' + (currentPhotos[index].type === 'video' ? '動画' : '写真') + 'を削除しますか？')) return;
      currentPhotos.splice(index, 1);
      await savePhotos(albumId, currentPhotos);
      renderPhotos();
    };

    window.closeLightbox = closeLightbox;
    window.changePhoto   = changePhoto;

    window.logout = () => {
      sessionStorage.removeItem('yamapper_auth');
      window.location.href = 'index.html';
    };

    loadAlbum();
  </script>
</body>
</html>
