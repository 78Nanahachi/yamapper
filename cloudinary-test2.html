<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <title>Cloudinary テスト2</title>
  <style>
    body { font-family: sans-serif; max-width: 600px; margin: 40px auto; padding: 1rem; }
    #dropZone {
      border: 3px dashed #4A7C59; border-radius: 12px;
      padding: 3rem; text-align: center; cursor: pointer;
      background: #f0f8f2;
    }
    #log { margin-top: 1rem; padding: 1rem; background: #f5f5f5; border-radius: 8px; font-size: 0.85rem; white-space: pre-wrap; min-height: 60px; }
    img { max-width: 200px; margin-top: 1rem; border-radius: 8px; display: none; }
  </style>
</head>
<body>
  <h2>Cloudinary テスト2（シンプル版）</h2>

  <div id="dropZone"
    ondragover="event.preventDefault()"
    ondrop="onDrop(event)"
    onclick="document.getElementById('fi').click()">
    📷 ここにD&D またはクリック
    <input type="file" id="fi" accept="image/*" style="display:none" onchange="upload(event.target.files[0])">
  </div>

  <div id="log">待機中…</div>
  <img id="preview">

  <script>
    const CLOUD_NAME    = 'dgsbvnswt';
    const UPLOAD_PRESET = 'yamapper_preset';

    function onDrop(e) {
      e.preventDefault();
      const file = e.dataTransfer.files[0];
      if (file) upload(file);
    }

    function toBase64(file) {
      return new Promise((resolve, reject) => {
        const reader = new FileReader();
        reader.onload  = () => resolve(reader.result);
        reader.onerror = reject;
        reader.readAsDataURL(file);
      });
    }

    async function upload(file) {
      log('変換中: ' + file.name);
      const base64 = await toBase64(file);
      log('送信中…\nPreset: ' + UPLOAD_PRESET + '\nCloud: ' + CLOUD_NAME);

      const payload = {
        file: base64,
        upload_preset: UPLOAD_PRESET
      };
      log('送信データ:\n' + JSON.stringify({upload_preset: payload.upload_preset, file: '(base64省略)'}));

      const res = await fetch(
        'https://api.cloudinary.com/v1_1/' + CLOUD_NAME + '/image/upload',
        {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify(payload)
        }
      );
      const data = await res.json();
      log('レスポンス:\n' + JSON.stringify(data, null, 2));

      if (data.secure_url) {
        document.getElementById('preview').src = data.secure_url;
        document.getElementById('preview').style.display = 'block';
      }
    }

    function log(msg) { document.getElementById('log').textContent = msg; }
  </script>
</body>
</html>
